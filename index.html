<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEPCO 자재센터 차량 예약시스템</title>
  <style>
    /* 화면 여백을 없애고 예약창이 꽉 차도록 설정합니다. */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; 
    }
    /* 구글 앱 스크립트 화면을 불러오는 창문(iframe) 설정입니다. */
    iframe { 
      width: 100%; 
      height: 100vh; 
      border: none; 
    }
  </style>
</head>
<body>
