  <script>
    const loader = document.getElementById('loader');

    // [1] 날짜 선택 시 예약 가능 시간대 업데이트
    function updateSlots() {
      const date = document.getElementById('date').value;
      const timeSelect = document.getElementById('time');
      timeSelect.innerHTML = '<option>예약 현황 조회 중...</option>';
      
      google.script.run
        .withSuccessHandler(slots => {
          if (slots.length === 0) {
            timeSelect.innerHTML = '<option value="">해당 날짜는 예약이 마감되었습니다</option>';
          } else {
            timeSelect.innerHTML = slots.map(s => `<option value="${s}">${s}</option>`).join('');
          }
        })
        .withFailureHandler(err => {
          alert("데이터 오류: " + err.message);
        })
        .getAvailableSlots(date);
    }

    // [2] 폼 제출 처리
    async function handleFormSubmit() {
      const form = document.getElementById('resForm');
      if(!form.checkValidity()) { form.reportValidity(); return; }

      loader.style.display = 'flex';
      
      const fileToBase64 = file => new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve({
          data: reader.result.split(',')[1],
          mimeType: file.type,
          name: file.name
        });
        reader.readAsDataURL(file);
      });

      try {
        const payload = {
          date: form.date.value,
          time: form.time.value,
          company: form.company.value,
          contact: form.contact.value,
          car1: form.car1.value,
          car2: form.car2.value,
          material: form.material.value,
          people: form.people.value,
          file1: await fileToBase64(document.getElementById('f1').files[0]),
          file2: await fileToBase64(document.getElementById('f2').files[0]),
          file3: await fileToBase64(document.getElementById('f3').files[0])
        };

        google.script.run
          .withSuccessHandler(msg => {
            loader.style.display = 'none';
            // 화면 전환 로직 (흰 화면 방지)
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-section').style.display = 'block';
            window.scrollTo(0, 0);
          })
          .withFailureHandler(err => {
            loader.style.display = 'none';
            alert("신청 오류: " + err.message);
          })
          .submitReservation(payload);
          
      } catch (e) {
        loader.style.display = 'none';
        alert("파일 처리 중 오류가 발생했습니다.");
      }
    }
  </script>
